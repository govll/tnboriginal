<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | The New Buckingham</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --netflix-red: #E50914;
    --gold: #C9A84C;
    --muted: #8a8a8a;
    --white: #ffffff;
    --dark: #0a0a0a;
  }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  .wrap {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    position: relative;
  }

  /* subtle background glow */
  .wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(201,168,76,0.12), transparent 60%);
    pointer-events: none;
  }

  .content {
    z-index: 2;
    max-width: 700px;
    animation: fadeUp 1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    letter-spacing: 6px;
    color: var(--gold);
    line-height: 1;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 900;
    margin-bottom: 16px;
  }

  .text {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(255,255,255,0.7);
    margin-bottom: 30px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: white;
    color: black;
    font-weight: 700;
    text-decoration: none;
    transition: 0.2s;
  }

  .btn:hover {
    background: rgba(255,255,255,0.85);
  }

  .subtitle {
    margin-top: 30px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="content">
    <div class="code">404</div>
    <h1 class="title">This page has been lost to the Crown.</h1>
    <p class="text">
      The page you’re looking for doesn’t exist… or has been quietly removed by royal decree.
      Either way, King Sam isn’t here to help you find it.
    </p>

    <a href="/" class="btn">Return to Palace</a>

    <div class="subtitle">The New Buckingham • Internal Archive Error</div>
  </div>
</div>

</body>
</html>
